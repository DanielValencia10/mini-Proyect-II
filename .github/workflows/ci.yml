name: CI — Lint & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '11'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # JOB 1: Lint + Type-check + Build del Frontend
  # ESLint 9 + jsx-a11y (WCAG 2.2 — SC 2.1.1 Keyboard, SC 4.1.2 ARIA)
  # ──────────────────────────────────────────────────────────────────────────
  client-ci:
    name: Client — Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Instalar dependencias
        working-directory: client
        run: pnpm install --frozen-lockfile

      - name: ESLint 9 (incluye jsx-a11y — WCAG 2.2)
        working-directory: client
        run: pnpm lint

      - name: TypeScript — verificación de tipos
        working-directory: client
        run: pnpm exec tsc --noEmit

      - name: Build de producción (Vite)
        working-directory: client
        env:
          VITE_FIREBASE_API_KEY: ci-placeholder
          VITE_FIREBASE_AUTH_DOMAIN: ci-project.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: ci-project
          VITE_FIREBASE_STORAGE_BUCKET: ci-project.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: '000000000000'
          VITE_FIREBASE_APP_ID: '1:000:web:000'
          VITE_BACKEND_URL: http://localhost:3000
          VITE_STUN_SERVER: stun:stun.l.google.com:19302
        run: pnpm build

  # ──────────────────────────────────────────────────────────────────────────
  # JOB 2: Lint + Build del Backend (Node.js nativo + Socket.IO + TS)
  # ──────────────────────────────────────────────────────────────────────────
  server-ci:
    name: Server — Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: server/pnpm-lock.yaml

      - name: Instalar dependencias
        working-directory: server
        run: pnpm install --frozen-lockfile

      - name: ESLint 9
        working-directory: server
        run: pnpm lint

      - name: TypeScript build (genera dist/)
        working-directory: server
        run: pnpm build
